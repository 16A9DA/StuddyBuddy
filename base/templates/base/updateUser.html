

{% extends 'main.html' %}

{% block content %}

<div class="form-wrapper">
    <div class="form-card">
        <h2 class="form-title">Update Account</h2>
        <p class="form-subtitle">Edit your profile information below.</p>

        <form action="" method="post" class="styled-form" enctype="multipart/form-data">
            {% csrf_token %}

            <p>
                <label>Username</label>
                <input  type="text"  name="username" value="{{ request.user.username }}" placeholder="Enter username…">
            </p>

            <p>
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ request.user.first_name }}" placeholder="Enter first name…">
            </p>

            <p>
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ request.user.last_name }}" placeholder="Enter last name…">
            </p>

            <p>
                <label>Email</label>
                <input type="email" name="email" value="{{ request.user.email }}" placeholder="Enter email…">
            </p>

            <input type="submit" value="Save Changes" class="btn-submit">
        </form>

    </div>
</div>

{% endblock %}
