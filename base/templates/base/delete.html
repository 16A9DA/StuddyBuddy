{% extends 'main.html' %}

{% block content %}

<div class="delete-wrapper">
    <div class="delete-card">
        <div class="delete-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/>
            </svg>
        </div>
        <h2 class="delete-title">Delete Confirmation</h2>
        <p class="delete-message">Are you sure you want to delete <span class="delete-obj">"{{ obj }}"</span>?<br>This action cannot be undone.</p>

        <form method="post" action="">
            {% csrf_token %}
            <div class="delete-actions">
                <a href="{{ request.META.HTTP_REFERER }}" class="btn-back">Go Back</a>
                <input type="submit" value="Yes, Delete" class="btn-confirm-delete">
            </div>
        </form>
    </div>
</div>

{% endblock content %}
