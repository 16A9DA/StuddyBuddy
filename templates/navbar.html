<div>
    <nav class="navbar">
        <a href="{% url 'Home' %}" class="navbar__logo">
            <span class="navbar__logo-dot"></span>
            <span>StudyBuddy</span>
        </a>

        <div class="navbar__search">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <form action="{% url 'Home' %}" method="get" >
            <input type="text" name="q" placeholder="Search topics or rooms">
        </form>
           
        </div>
        <div class="navbar__right">
            {% if request.user.is_authenticated %}
            <div class="navbar__user">
                        <!-- Add profile pic -->
                <div class="navbar__greeting">Hello, {{ request.user.username }} ▾</div>
                <div class="navbar__dropdown">
                    <a href="{% url 'userProfile' request.user.username %}">Profile</a>
                    <a href="{% url 'updateUser' %}">Settings</a>
                    <a href="{% url 'logout' %}">Logout</a>
                </div>
            </div>
            {% else %}
            <a href="{% url 'login' %}" class="navbar__login">Log in</a>
            {% endif %}
        </div>
    
    </nav>
</div>
